<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ShogiAgent</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0f172a;
  --surface: #1e293b;
  --border:  #334155;
  --text:    #e2e8f0;
  --muted:   #94a3b8;
  --green:   #22c55e;
  --amber:   #f59e0b;
  --red:     #ef4444;
  --blue:    #3b82f6;
}
html, body { height: 100%; background: var(--bg); color: var(--text);
             font-family: 'Segoe UI', sans-serif; font-size: 13px; }
body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ── ヘッダー ── */
header { background: var(--surface); border-bottom: 1px solid var(--border);
         padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
header h1 { font-size: 15px; font-weight: 700; letter-spacing: .5px; }
header .ver { font-size: 11px; color: var(--muted); }
header .spacer { flex: 1; }
#btn-toggle { padding: 5px 14px; border-radius: 6px; border: none; cursor: pointer;
              font-size: 12px; font-weight: 600; transition: background .15s; }
#btn-toggle.running { background: var(--red); color: #fff; }
#btn-toggle.stopped { background: var(--green); color: #fff; }

/* ── ステータスバー ── */
#status-row { display: flex; gap: 8px; padding: 10px 16px; flex-shrink: 0; }
.status-card { flex: 1; background: var(--surface); border: 1px solid var(--border);
               border-radius: 8px; padding: 10px 12px; }
.status-card .label { font-size: 10px; color: var(--muted); text-transform: uppercase;
                       letter-spacing: .5px; margin-bottom: 4px; }
.status-card .value { display: flex; align-items: center; gap: 6px; font-weight: 600; font-size: 13px; }
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot.green  { background: var(--green); box-shadow: 0 0 6px var(--green); }
.dot.amber  { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
.dot.red    { background: var(--red); }
.dot.gray   { background: var(--muted); }

/* ── タブ ── */
#tabs { display: flex; padding: 0 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.tab { padding: 8px 14px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent;
       font-size: 12px; font-weight: 600; transition: color .15s; }
.tab.active { color: var(--blue); border-bottom-color: var(--blue); }

/* ── タブコンテンツ ── */
#tab-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.tab-pane { display: none; flex: 1; overflow-y: auto; padding: 16px; }
.tab-pane.active { display: flex; flex-direction: column; gap: 12px; }

/* ── フォーム ── */
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 11px; color: var(--muted); font-weight: 600; }
.field input, .field select {
  background: var(--surface); border: 1px solid var(--border); color: var(--text);
  padding: 7px 10px; border-radius: 6px; font-size: 13px; width: 100%;
  outline: none; transition: border-color .15s;
}
.field input:focus, .field select:focus { border-color: var(--blue); }
.row { display: flex; gap: 8px; align-items: flex-end; }
.row .field { flex: 1; }
button.secondary { padding: 7px 12px; border-radius: 6px; border: 1px solid var(--border);
                   background: var(--surface); color: var(--text); cursor: pointer;
                   font-size: 12px; white-space: nowrap; }
button.secondary:hover { border-color: var(--blue); color: var(--blue); }
button.primary { padding: 7px 16px; border-radius: 6px; border: none;
                 background: var(--blue); color: #fff; cursor: pointer;
                 font-size: 12px; font-weight: 600; }
button.primary:hover { opacity: .9; }

/* ── ログ ── */
#log { flex: 1; overflow-y: auto; padding: 8px; background: #0a0f1a;
       border-radius: 8px; font-family: 'Consolas', monospace; font-size: 11.5px;
       line-height: 1.5; }
#log .entry { padding: 1px 4px; border-radius: 3px; }
#log .entry:hover { background: rgba(255,255,255,.04); }
#log .t  { color: #475569; margin-right: 6px; }
#log .ok   { color: var(--green); }
#log .warn { color: var(--amber); }
#log .err  { color: var(--red); }
#log .info { color: #7dd3fc; }
#log .plain { color: var(--muted); }

/* ── トークン ── */
.token-row { display: flex; gap: 8px; align-items: center; }
.token-box { flex: 1; background: var(--surface); border: 1px solid var(--border);
             padding: 7px 10px; border-radius: 6px; font-size: 12px; color: var(--muted);
             font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 10px;
         font-weight: 700; background: #1e3a5f; color: var(--blue); margin-left: 8px; }

/* ── ペアリングパネル ── */
#pairing-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7);
                 z-index: 100; align-items: center; justify-content: center; }
#pairing-panel.visible { display: flex; }
#pairing-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
               padding: 24px; max-width: 420px; width: 90%; text-align: center; }
#pairing-box h2 { font-size: 15px; margin-bottom: 12px; }
#pairing-box p  { font-size: 12px; color: var(--muted); margin-bottom: 16px; line-height: 1.6; }
#pairing-code { font-size: 28px; font-weight: 800; letter-spacing: 6px; color: var(--blue);
                background: #1e3a5f; padding: 10px 20px; border-radius: 8px;
                display: inline-block; margin-bottom: 16px; font-family: monospace; }
#pairing-url-btn { padding: 8px 18px; border-radius: 6px; border: none;
                   background: var(--blue); color: #fff; cursor: pointer;
                   font-size: 12px; font-weight: 600; margin-bottom: 12px; }
#pairing-url-btn:hover { opacity: .9; }
#pairing-cancel { background: none; border: none; color: var(--muted); cursor: pointer;
                  font-size: 11px; text-decoration: underline; }
</style>
</head>
<body>

<!-- ヘッダー -->
<header>
  <h1>ShogiAgent</h1>
  <span class="ver">v2.0</span>
  <span class="spacer"></span>
  <button id="btn-toggle" class="stopped">接続開始</button>
  <button id="btn-force-stop" style="display:none; padding:5px 12px; border-radius:6px; border:none; cursor:pointer; font-size:11px; font-weight:600; background:var(--amber); color:#000;">⚠ エンジン強制停止</button>
</header>

<!-- ステータス -->
<div id="status-row">
  <div class="status-card">
    <div class="label">シグナリング</div>
    <div class="value"><div class="dot gray" id="dot-sig"></div><span id="txt-sig">未接続</span></div>
  </div>
  <div class="status-card">
    <div class="label">DataChannel</div>
    <div class="value"><div class="dot gray" id="dot-dc"></div><span id="txt-dc">未接続</span></div>
  </div>
  <div class="status-card">
    <div class="label">エンジン</div>
    <div class="value"><div class="dot gray" id="dot-eng"></div><span id="txt-eng">停止中</span>
      <button id="btn-engine-restart" title="エンジン強制再起動" style="display:none; margin-left:auto; padding:2px 8px; border-radius:4px; border:1px solid var(--amber); background:transparent; color:var(--amber); cursor:pointer; font-size:10px; font-weight:600;">再起動</button>
    </div>
  </div>
</div>

<!-- タブ -->
<div id="tabs">
  <div class="tab active" data-tab="log">ログ</div>
  <div class="tab" data-tab="config">設定</div>
</div>

<!-- タブコンテンツ -->
<div id="tab-content">
  <!-- ログ -->
  <div class="tab-pane active" id="pane-log">
    <div id="log"></div>
  </div>

  <!-- 設定 -->
  <div class="tab-pane" id="pane-config">
    <div class="field">
      <label>エンジン実行ファイル</label>
      <div class="row">
        <div class="field"><input type="text" id="cfg-engine" placeholder="エンジン実行ファイルのパス" /></div>
        <button class="secondary" id="btn-browse">参照…</button>
      </div>
    </div>

    <div class="field">
      <label>サーバーURL</label>
      <input type="text" id="cfg-server" placeholder="https://analytics.pkkis.com" />
    </div>

    <div class="field">
      <label>エージェント名 (表示名)</label>
      <input type="text" id="cfg-agent-name" placeholder="例: 自宅PC" maxlength="64" />
    </div>

    <div class="field">
      <label>エンジン表示名</label>
      <input type="text" id="cfg-engine-name" placeholder="例: YaneuraOu 9.00" maxlength="64" />
    </div>

    <div class="field">
      <label>エージェントトークン</label>
      <div class="token-row">
        <div class="token-box" id="cfg-token">未設定</div>
        <button class="secondary" id="btn-copy-token">コピー</button>
        <button class="secondary" id="btn-reset-token" style="color:var(--red);border-color:var(--red);">リセット</button>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px;">
        トークンはサーバーへの初回接続時にペアリングで取得されます。
      </div>
    </div>

    <div style="display:flex;gap:8px;margin-top:4px;">
      <button class="primary" id="btn-save">保存して再接続</button>
    </div>

    <div id="save-msg" style="font-size:11px;color:var(--green);min-height:16px;"></div>
  </div>
</div>

<!-- ペアリングパネル (モーダル) -->
<div id="pairing-panel">
  <div id="pairing-box">
    <h2>エージェントの認証</h2>
    <p>ブラウザで以下のURLを開き、<br>このコードを入力してエージェントを認証してください。</p>
    <div id="pairing-code">------</div><br>
    <button id="pairing-url-btn">ブラウザで開く</button><br>
    <button id="pairing-cancel">キャンセル</button>
  </div>
</div>

<script>
// ============================================================
//  ShogiAgent — Renderer
//  WebRTC (ブラウザネイティブ) + USI エンジン (IPC経由) + UI
// ============================================================
'use strict';

// ── ログ表示 ──────────────────────────────────────────────
const logEl = document.getElementById('log');
const MAX_LOG = 600;

function addLog(msg, cls = 'plain') {
  const t = new Date().toLocaleTimeString('ja-JP');
  const div = document.createElement('div');
  div.className = 'entry';
  const stripped = msg.replace(/\x1b\[[0-9;]*m/g, '');
  div.innerHTML = `<span class="t">[${t}]</span><span class="${cls}">${escHtml(stripped)}</span>`;
  logEl.appendChild(div);
  while (logEl.children.length > MAX_LOG) logEl.removeChild(logEl.firstChild);
  logEl.scrollTop = logEl.scrollHeight;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function logOk(label, msg)   { addLog(`[${label}] ${msg}`, 'ok'); }
function logWarn(label, msg) { addLog(`[${label}] ${msg}`, 'warn'); }
function logErr(label, msg)  { addLog(`[${label}] ${msg}`, 'err'); }
function logInfo(label, msg) { addLog(`[${label}] ${msg}`, 'info'); }

// ── ステータス更新 ────────────────────────────────────────
function setStatus(id, color, text) {
  document.getElementById('dot-' + id).className = 'dot ' + color;
  document.getElementById('txt-' + id).textContent = text;
  // エンジンステータスに応じて強制停止ボタンを表示/非表示
  if (id === 'eng') {
    const btn = document.getElementById('btn-force-stop');
    if (btn) btn.style.display = (color === 'amber') ? 'inline-block' : 'none';
  }
}

// ── タブ切り替え ──────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('pane-' + tab.dataset.tab).classList.add('active');
  });
});

// ============================================================
//  設定
// ============================================================
let config = {};

async function loadAndApplyConfig() {
  config = await window.api.loadConfig();
  document.getElementById('cfg-engine').value      = config.enginePath        || '';
  document.getElementById('cfg-server').value      = config.serverUrl         || 'https://analytics.pkkis.com';
  document.getElementById('cfg-agent-name').value  = config.agentName         || '';
  document.getElementById('cfg-engine-name').value = config.engineDisplayName || '';
  const tok = config.agentToken || '';
  document.getElementById('cfg-token').textContent = tok || '未設定';
}

document.getElementById('btn-browse').addEventListener('click', async () => {
  const p = await window.api.browseEngine();
  if (p) { document.getElementById('cfg-engine').value = p; }
});

document.getElementById('btn-copy-token').addEventListener('click', () => {
  const tok = config.agentToken || '';
  if (tok) { navigator.clipboard.writeText(tok); showSaveMsg('コピーしました'); }
});

document.getElementById('btn-save').addEventListener('click', async () => {
  config.enginePath        = document.getElementById('cfg-engine').value.trim();
  config.serverUrl         = document.getElementById('cfg-server').value.trim() || 'https://analytics.pkkis.com';
  config.agentName         = document.getElementById('cfg-agent-name').value.trim();
  config.engineDisplayName = document.getElementById('cfg-engine-name').value.trim();
  await window.api.saveConfig(config);
  showSaveMsg('保存しました — 再接続します');
  setTimeout(() => startAgent(), 500);
});

document.getElementById('btn-reset-token').addEventListener('click', async () => {
  config.agentToken = '';
  await window.api.saveConfig(config);
  document.getElementById('cfg-token').textContent = '未設定';
  showSaveMsg('トークンをリセットしました。再接続でペアリングが実行されます。');
});

function showSaveMsg(msg) {
  const el = document.getElementById('save-msg');
  el.textContent = msg;
  setTimeout(() => { el.textContent = ''; }, 3000);
}

// ============================================================
//  エンジン状態 (index.js と同じロジック)
// ============================================================
let engineReady = false;
let isThinking  = false;
let currentSFEN = null;
const engineOptions = [];

let autoState           = 'idle';
let autoPositions       = [];
let autoCondition       = { type: 'movetime', value: 3000 };
let autoCurrentIdx      = 0;
let autoBestInfo        = {};
let pendingAutoAnalysis = null;
let pendingAnalysis     = null;
let pendingOptions      = null;
let aiThinkMode         = false;
let pendingAiThink      = null;
let intentionalKill     = false;  // 意図的なkillでは自動再起動しない
let restartTimer        = null;   // エンジン自動再起動タイマー
let resumeAfterOptions  = null;   // set_options後に再開するセッション情報
let pendingStandby      = false;  // readyok後にstandbyステータスを発行

function sendEngine(cmd) { window.api.engineSend(cmd); }

function emitToClient(event, data) {
  if (dc && dc.readyState === 'open') {
    try { dc.send(JSON.stringify({ event, data })); } catch (_) {}
  }
}

function fmtNodes(n) {
  if (n >= 1_000_000) return `${(n / 1_000_000).toFixed(1)}M`;
  if (n >= 1_000)     return `${Math.round(n / 1_000)}K`;
  return String(n);
}

function parseOptionLine(line) {
  const tokens = line.trim().split(/\s+/);
  const r = { name:'', type:'string', default:'', value:'', min:undefined, max:undefined, vars:[] };
  let i = 1;
  while (i < tokens.length) {
    const k = tokens[i];
    if (k === 'name') {
      i++; const p = [];
      while (i < tokens.length && tokens[i] !== 'type') p.push(tokens[i++]);
      r.name = p.join(' ');
    } else if (k === 'type')    { r.type    = tokens[++i]; i++; }
      else if (k === 'default') { i++; const p = [];
        while (i < tokens.length && !['min','max','var'].includes(tokens[i])) p.push(tokens[i++]);
        r.default = p.join(' ');
      }
      else if (k === 'min') { r.min = parseInt(tokens[++i]); i++; }
      else if (k === 'max') { r.max = parseInt(tokens[++i]); i++; }
      else if (k === 'var') { r.vars.push(tokens[++i]); i++; }
      else { i++; }
  }
  r.value = r.default;
  return r;
}

function parseInfoLine(line) {
  const depth   = parseInt(line.match(/\bdepth (\d+)/)?.[1]   ?? '0');
  const multipv = parseInt(line.match(/\bmultipv (\d+)/)?.[1] ?? '1');
  const nodes   = parseInt(line.match(/\bnodes (\d+)/)?.[1]   ?? '0');
  let score = 0, isMate = false, mateIn = null;
  const cpM = line.match(/\bscore cp (-?\d+)/);
  const mtM = line.match(/\bscore mate (-?\d+)/);
  if (cpM)      { score = parseInt(cpM[1]); }
  else if (mtM) { isMate = true; mateIn = parseInt(mtM[1]); score = mateIn > 0 ? 32000 : -32000; }
  const pvM = line.match(/\bpv (.+)$/);
  return { depth, multipv, score, isMate, mateIn, nodes: fmtNodes(nodes), pvUSI: pvM ? pvM[1].trim() : '' };
}

function doStartAnalysis(sfen) {
  currentSFEN = sfen; isThinking = true;
  // usinewgame は送らない — ハッシュテーブルを保持して連続解析を高速化
  sendEngine(`position sfen ${sfen}`);
  sendEngine('go infinite');
  emitToClient('engine:status', { status: 'thinking' });
}

function requestAnalysis(sfen) {
  if (!engineReady) { pendingAnalysis = sfen; return; }
  if (autoState !== 'idle') return;
  if (isThinking) { pendingAnalysis = sfen; sendEngine('stop'); }
  else             doStartAnalysis(sfen);
}

function applyOptions(options) {
  for (const { name, value } of options) {
    sendEngine(`setoption name ${name} value ${value}`);
    const opt = engineOptions.find(o => o.name === name);
    if (opt) opt.value = value;
  }
  // 設定を保存
  const saved = {};
  for (const opt of engineOptions) { if (opt.value !== opt.default) saved[opt.name] = opt.value; }
  config.engineOptions = saved;
  window.api.saveEngineOpts(config);
  // 設定変更後は自動で解析再開しない (検討/解析中でも停止状態で待機)
  sendEngine('isready');
  emitToClient('engine:status', { status: 'connecting', message: 'オプション反映中…' });
}

// pending キューを順番に処理
function dispatchPending() {
  if      (pendingAutoAnalysis) { const a = pendingAutoAnalysis; pendingAutoAnalysis = null; doStartAutoAnalysis(a.positions, a.condition); }
  else if (pendingAiThink)      { const a = pendingAiThink;      pendingAiThink      = null; doAiThink(a.sfen, a.cpuConfig, a.remainingTimes); }
  else if (pendingAnalysis)     { const s = pendingAnalysis;     pendingAnalysis     = null; doStartAnalysis(s); }
}

// エンジンを再起動してスタンバイ状態へ（エンジンは起動したまま待機）
async function goToStandby() {
  pendingAnalysis = null; pendingAutoAnalysis = null; pendingAiThink = null; pendingOptions = null;
  resumeAfterOptions = null; autoState = 'idle'; autoPositions = [];
  isThinking = false; aiThinkMode = false;
  if (restartTimer) { clearTimeout(restartTimer); restartTimer = null; }
  pendingStandby = true;
  engineReady = false;
  setStatus('eng', 'amber', '再起動中…');
  emitToClient('engine:status', { status: 'connecting', message: 'スタンバイへ移行中…' });
  intentionalKill = true;
  await window.api.engineKill();
  startEngineProc();
}

// エンジンを殺さずにスタンバイ状態へ（ナビゲーション時など軽量リセット用）
function softStandby() {
  pendingAnalysis = null; pendingAutoAnalysis = null; pendingAiThink = null; pendingOptions = null;
  resumeAfterOptions = null;
  if (isThinking && autoState === 'idle' && !aiThinkMode) sendEngine('stop');
  autoState = 'idle'; autoPositions = [];
  isThinking = false; aiThinkMode = false;
  setStatus('eng', 'green', 'スタンバイ中');
  emitToClient('engine:status', { status: 'standby', message: 'スタンバイ中' });
}

function doAiThink(sfen, cpuConfig, remainingTimes) {
  isThinking = true; aiThinkMode = true;
  sendEngine('usinewgame');
  sendEngine(`position sfen ${sfen}`);
  if (!cpuConfig) { sendEngine('go movetime 3000'); }
  else {
    const { thinkType, thinkParams = {} } = cpuConfig;
    const btime = Math.max(0, remainingTimes?.[1] || 0);
    const wtime = Math.max(0, remainingTimes?.[2] || 0);
    switch (thinkType) {
      case 'nodes':   sendEngine(`go nodes ${thinkParams.nodes ?? 500000}`); break;
      case 'depth':   sendEngine(`go depth ${thinkParams.depth ?? 15}`); break;
      case 'byoyomi': sendEngine(`go btime ${btime} wtime ${wtime} byoyomi ${thinkParams.byoyomiMs ?? 5000}`); break;
      default:        sendEngine('go movetime 3000');
    }
  }
  emitToClient('engine:status', { status: 'thinking' });
}

function runNextAutoPosition() {
  if (autoState !== 'running') return;
  if (autoCurrentIdx >= autoPositions.length) {
    autoState = 'idle'; isThinking = false;
    emitToClient('auto_analysis:complete', { total: autoPositions.length });
    goToStandby();
    return;
  }
  const pos = autoPositions[autoCurrentIdx];
  autoBestInfo = {}; isThinking = true;
  sendEngine('usinewgame');
  sendEngine(`position sfen ${pos.sfen}`);
  const { type, value } = autoCondition;
  if      (type === 'movetime') sendEngine(`go movetime ${value}`);
  else if (type === 'nodes')    sendEngine(`go nodes ${value}`);
  else if (type === 'depth')    sendEngine(`go depth ${value}`);
  else                          sendEngine('go movetime 3000');
}

function doStartAutoAnalysis(positions, condition) {
  autoState = 'running'; autoPositions = positions;
  autoCondition = condition || { type: 'movetime', value: 3000 };
  autoCurrentIdx = 0;
  emitToClient('auto_analysis:started', { total: positions.length });
  setStatus('eng', 'amber', `解析中 0/${positions.length}`);
  runNextAutoPosition();
}

function onEngineLine(line) {
  if (line.startsWith('option ')) {
    const opt = parseOptionLine(line);
    if (opt.name) engineOptions.push(opt);
    return;
  }
  if (line === 'usiok') {
    const saved = config.engineOptions || {};
    for (const [name, value] of Object.entries(saved)) {
      sendEngine(`setoption name ${name} value ${value}`);
      const opt = engineOptions.find(o => o.name === name);
      if (opt) opt.value = String(value);
    }
    emitToClient('engine:options', engineOptions);
    sendEngine('isready');
    return;
  }
  if (line === 'readyok') {
    engineReady = true;
    if (pendingStandby) {
      pendingStandby = false;
      logOk('Engine', 'スタンバイ');
      setStatus('eng', 'gray', 'スタンバイ');
      emitToClient('engine:status', { status: 'standby', message: 'スタンバイ中' });
      emitToClient('engine:options', engineOptions);
      return;
    }
    logOk('Engine', 'エンジン準備完了');
    setStatus('eng', 'green', '準備完了');
    emitToClient('engine:status', { status: 'ready', message: 'エンジン準備完了' });
    emitToClient('engine:options', engineOptions);
    if (pendingAutoAnalysis)     { const a = pendingAutoAnalysis;   pendingAutoAnalysis   = null; doStartAutoAnalysis(a.positions, a.condition); }
    else if (pendingAiThink)     { const a = pendingAiThink;        pendingAiThink        = null; doAiThink(a.sfen, a.cpuConfig, a.remainingTimes); }
    else if (pendingAnalysis)    { const s = pendingAnalysis;       pendingAnalysis       = null; doStartAnalysis(s); }
    else if (resumeAfterOptions) { const r = resumeAfterOptions;    resumeAfterOptions    = null;
      if (r.type === 'auto')     doStartAutoAnalysis(r.positions, r.condition);
      else if (r.type === 'analysis') doStartAnalysis(r.sfen);
    }
    return;
  }
  if (line.startsWith('info') && line.includes(' pv ') && line.includes('depth')) {
    const data = parseInfoLine(line);
    if (autoState === 'running') {
      autoBestInfo[data.multipv] = data;
    } else {
      emitToClient('engine:info', data);
    }
    return;
  }
  if (line.startsWith('bestmove')) {
    isThinking = false;
    const bestMoveToken = line.split(' ')[1] ?? 'none';
    if (autoState === 'running' || autoState === 'stopping') {
      if (autoState === 'stopping') {
        autoState = 'idle'; autoPositions = [];
        emitToClient('auto_analysis:stopped', { stoppedAt: autoCurrentIdx });
        goToStandby();
        return;
      }
      const pos = autoPositions[autoCurrentIdx];
      const best = autoBestInfo[1];
      if (best && pos) {
        emitToClient('auto_analysis:progress', {
          current: autoCurrentIdx + 1, total: autoPositions.length,
          moveIndex: pos.moveIndex, depth: best.depth,
        });
        emitToClient('auto_analysis:result', {
          moveIndex: pos.moveIndex,
          evalScore: pos.player === 1 ? best.score : -best.score,
          candidates: Object.values(autoBestInfo).sort((a, b) => a.multipv - b.multipv),
        });
      }
      autoCurrentIdx++;
      const remaining = autoPositions.length - autoCurrentIdx;
      setStatus('eng', 'amber', `解析中 ${autoCurrentIdx}/${autoPositions.length}`);
      setTimeout(runNextAutoPosition, 0);
      return;
    }
    if (aiThinkMode) {
      aiThinkMode = false;
      emitToClient('ai:bestmove', { move: bestMoveToken });
      emitToClient('engine:status', { status: 'ready' });
      if (pendingAiThink) { const a = pendingAiThink; pendingAiThink = null; doAiThink(a.sfen, a.cpuConfig, a.remainingTimes); }
      return;
    }
    if (pendingAiThink)           { const a = pendingAiThink;        pendingAiThink        = null; doAiThink(a.sfen, a.cpuConfig, a.remainingTimes); }
    else if (pendingAutoAnalysis) { const a = pendingAutoAnalysis;   pendingAutoAnalysis   = null; doStartAutoAnalysis(a.positions, a.condition); }
    else if (pendingOptions)      { const o = pendingOptions;        pendingOptions        = null; applyOptions(o); }
    else if (pendingAnalysis)     { const s = pendingAnalysis;       pendingAnalysis       = null; doStartAnalysis(s); }
    else {
      emitToClient('engine:bestmove', { move: bestMoveToken });
      emitToClient('engine:status', { status: 'ready', message: '解析完了' });
      setStatus('eng', 'green', '準備完了');
    }
  }
}

function handleClientEvent(event, data) {
  switch (event) {
    case 'start_analysis':
      if (data?.sfen) ensureThenRun(() => { pendingAnalysis = data.sfen; });
      break;
    case 'analyze':
      if (data?.sfen) requestAnalysis(data.sfen); break;
    case 'stop':
      pendingAnalysis = null;
      if (isThinking && autoState === 'idle' && !aiThinkMode) sendEngine('stop');
      break;
    case 'stop_and_standby':
      softStandby();
      break;
    case 'restart_engine':
      goToStandby();
      break;
    case 'set_options':
      if (!Array.isArray(data) || !data.length) break;
      // エンジン設定を即座に保存 (ensureThenRun で pendingOptions がクリアされる前に確実に保存)
      for (const { name, value } of data) {
        const opt = engineOptions.find(o => o.name === name);
        if (opt) opt.value = String(value);
      }
      { const saved = {};
        for (const opt of engineOptions) { if (opt.value !== opt.default) saved[opt.name] = opt.value; }
        config.engineOptions = saved; window.api.saveEngineOpts(config); }
      // アクティブセッションを保存 (オプション適用後に再開するため)
      if (autoState === 'running') {
        resumeAfterOptions = { type: 'auto', positions: autoPositions.slice(autoCurrentIdx), condition: autoCondition };
      } else if (isThinking && !aiThinkMode && currentSFEN) {
        resumeAfterOptions = { type: 'analysis', sfen: currentSFEN };
      }
      if (isThinking) { pendingOptions = data; sendEngine('stop'); } else applyOptions(data);
      break;
    case 'start_auto_analysis': {
      const { positions, condition } = data || {};
      if (!Array.isArray(positions) || !positions.length) break;
      const cond = (condition?.type && condition?.value > 0) ? condition : { type: 'movetime', value: 3000 };
      ensureThenRun(() => { pendingAutoAnalysis = { positions, condition: cond }; });
      break;
    }
    case 'ai_think': {
      const { sfen, cpuConfig, remainingTimes } = data || {};
      if (!sfen) break;
      ensureThenRun(() => { pendingAiThink = { sfen, cpuConfig, remainingTimes }; });
      break;
    }
    case 'stop_ai_think':
      pendingAiThink = null;
      if (isThinking && aiThinkMode) { aiThinkMode = false; sendEngine('stop'); }
      break;
    case 'stop_auto_analysis':
      if (autoState === 'running') { autoState = 'stopping'; sendEngine('stop'); }
      else if (autoState === 'idle') pendingAutoAnalysis = null;
      break;
    default:
      logWarn('DC', `不明なイベント: ${event}`);
  }
}

// IPC: エンジン出力を受信
window.api.onEngineLine(line => onEngineLine(line));
window.api.onEngineExit(code => {
  if (intentionalKill) { intentionalKill = false; return; }
  logWarn('Engine', `終了 (code=${code})`);
  engineReady = false; isThinking = false; aiThinkMode = false;
  setStatus('eng', 'red', `終了 (code=${code})`);
  emitToClient('engine:status', { status: 'error', message: `エンジン終了 (code ${code})` });
  if (dc && dc.readyState === 'open') {
    restartTimer = setTimeout(() => startEngineProc(), 2000);
  }
});
window.api.onEngineError(msg => {
  logErr('Engine', msg);
  setStatus('eng', 'red', 'エラー');
});

async function ensureThenRun(setPending) {
  pendingAnalysis = null; pendingAutoAnalysis = null; pendingAiThink = null; pendingOptions = null;
  resumeAfterOptions = null; pendingStandby = false; autoState = 'idle'; autoPositions = [];
  isThinking = false;
  if (restartTimer) { clearTimeout(restartTimer); restartTimer = null; }
  if (engineReady) {
    // エンジンはすでに起動済み → pendingを設定してすぐ実行
    setPending();
    dispatchPending();
    return;
  }
  // 起動していない or バグで止まっている → 再起動
  engineReady = false;
  setStatus('eng', 'amber', '起動中…');
  emitToClient('engine:status', { status: 'connecting', message: 'エンジン起動中…' });
  intentionalKill = true;
  await window.api.engineKill();
  setPending();
  startEngineProc();
}

async function startEngineProc() {
  if (!config.enginePath) {
    logErr('Engine', 'エンジンパスが未設定です。設定タブで指定してください。');
    setStatus('eng', 'red', '未設定');
    emitToClient('engine:status', { status: 'error', message: 'エンジンが設定されていません' });
    return;
  }
  engineOptions.length = 0;
  engineReady = false;
  logInfo('Engine', `起動中: ${config.enginePath.split(/[/\\]/).pop()}`);
  setStatus('eng', 'amber', '起動中…');
  emitToClient('engine:status', { status: 'connecting', message: 'エンジン起動中…' });
  const result = await window.api.engineStart(config.enginePath);
  if (!result.ok) {
    logErr('Engine', `起動失敗: ${result.reason}`);
    setStatus('eng', 'red', '起動失敗');
    emitToClient('engine:status', { status: 'error', message: `起動失敗: ${result.reason}` });
    return;
  }
  sendEngine('usi');
}

// ============================================================
//  WebRTC / シグナリング (ブラウザ ネイティブ)
// ============================================================
let sigSocket  = null;
let peerConn   = null;
let dc         = null;
let agentId    = null;

const STUN_SERVERS = [{ urls: 'stun:stun.l.google.com:19302' }];

function connectSignaling() {
  if (sigSocket) { try { sigSocket.disconnect(); } catch (_) {} sigSocket = null; }

  const { io } = require('socket.io-client');
  const agentName   = config.agentName || '';
  const engineName  = config.engineDisplayName || config.enginePath?.split(/[/\\]/).pop() || '';
  sigSocket = io(config.serverUrl, {
    query:      { role: 'agent', token: config.agentToken, agentName, engineName },
    transports: ['websocket', 'polling'],
  });

  sigSocket.on('connect', () => {
    logOk('Sig', `シグナリングサーバーに接続 (id=${sigSocket.id?.slice(0,8)}…)`);
    setStatus('sig', 'green', '接続済み');
    // agentId をサーバーに問い合わせる (サーバーがトークンから agentId を決定)
    sigSocket.emit('get_agent_id');
  });

  sigSocket.on('agent_id', (id) => { agentId = id; logInfo('Sig', `agentId: ${id?.slice(0,8)}…`); });

  sigSocket.on('connect_error', (err) => {
    logErr('Sig', `接続エラー: ${err.message}`);
    setStatus('sig', 'red', '接続エラー');
    // トークンが明確にサーバー側で拒否された場合のみリセット
    if (err.message === 'agent revoked or not found' || err.message === 'token required') {
      logWarn('Auth', 'トークンが無効です。設定タブからリセットして再ペアリングしてください。');
      config.agentToken = '';
      document.getElementById('cfg-token').textContent = '未設定（リセット済み）';
      window.api.saveConfig(config);
      running = false; updateToggleBtn();
      if (sigSocket) { try { sigSocket.disconnect(); } catch (_) {} sigSocket = null; }
    }
  });

  sigSocket.on('disconnect', (reason) => {
    logWarn('Sig', `切断: ${reason}`);
    setStatus('sig', 'amber', '切断');
    closePcDc();
  });

  // フロントエンドが接続 → WebRTC を準備
  sigSocket.on('peer-joined', ({ role }) => {
    logInfo('Sig', `peer joined: role=${role}`);
    if (role === 'frontend') setupWebRTC();
  });

  sigSocket.on('peer-left', ({ role }) => {
    logWarn('Sig', `peer left: role=${role}`);
    if (role === 'frontend') closePcDc();
  });

  // SDP offer を受信
  sigSocket.on('offer', async ({ sdp, type }) => {
    logInfo('WebRTC', `SDP offer 受信`);
    // 既存 PC が別セッションの残り (remote description 設定済み or closed) なら作り直す
    // peer-joined で作られた新鮮な PC はそのまま再利用する（ICE 候補の互換性維持）
    if (!peerConn || peerConn.remoteDescription || peerConn.signalingState === 'closed') {
      setupWebRTC();
    }
    const myPc = peerConn;
    try {
      await myPc.setRemoteDescription(new RTCSessionDescription({ sdp, type }));
      const answer = await myPc.createAnswer();
      await myPc.setLocalDescription(answer);
      if (myPc !== peerConn) return; // より新しい offer が来ていたらキャンセル
      sigSocket.emit('answer', { sdp: myPc.localDescription.sdp, type: myPc.localDescription.type });
    } catch (e) {
      logErr('WebRTC', `answer 生成失敗: ${e.message}`);
    }
  });

  // ICE candidate
  sigSocket.on('ice-candidate', ({ candidate, sdpMid, sdpMLineIndex }) => {
    if (!peerConn || !candidate) return;
    peerConn.addIceCandidate(new RTCIceCandidate({ candidate, sdpMid, sdpMLineIndex }))
      .catch(e => logWarn('WebRTC', `ICE candidate 失敗: ${e.message}`));
  });
}

function setupWebRTC() {
  closePcDc();
  const myPc = new RTCPeerConnection({ iceServers: STUN_SERVERS });
  peerConn = myPc;

  myPc.onicecandidate = ({ candidate }) => {
    if (myPc !== peerConn) return; // 古い PC のコールバック → 無視
    if (candidate && sigSocket?.connected) {
      sigSocket.emit('ice-candidate', {
        candidate:     candidate.candidate,
        sdpMid:        candidate.sdpMid,
        sdpMLineIndex: candidate.sdpMLineIndex,
      });
    }
  };

  myPc.oniceconnectionstatechange = () => {
    if (myPc !== peerConn) return; // 古い PC のコールバック → 無視
    logInfo('WebRTC', `ICE: ${myPc.iceConnectionState}`);
    if (myPc.iceConnectionState === 'failed' || myPc.iceConnectionState === 'disconnected') {
      closePcDc();
    }
  };

  myPc.ondatachannel = ({ channel }) => {
    if (myPc !== peerConn) { try { channel.close(); } catch (_) {} return; } // 古い PC
    logInfo('DC', 'DataChannel 受信');
    dc = channel;

    channel.onopen = () => {
      setStatus('dc', 'green', '接続済み');
      // 前の接続で残った自動解析状態をリセット
      if (autoState === 'running' || autoState === 'stopping') {
        sendEngine('stop');
        autoState = 'idle'; autoPositions = [];
        logInfo('Engine', '新規接続 — 自動解析状態をリセット');
      }
      if (engineReady) {
        // エンジンはすでに動作中 → 再起動せず現在状態を通知
        logOk('DC', 'DataChannel オープン → エンジン再利用');
        emitToClient('engine:status', { status: 'ready', message: 'エンジン準備完了' });
        emitToClient('engine:options', engineOptions);
      } else {
        // スタンバイモード: 検討/棋譜解析/対局が開始されるまでエンジンを起動しない
        logOk('DC', 'DataChannel オープン → スタンバイ');
        setStatus('eng', 'gray', 'スタンバイ');
        emitToClient('engine:status', { status: 'standby', message: 'スタンバイ中…' });
      }
    };

    channel.onmessage = ({ data }) => {
      try {
        const { event, data: d } = JSON.parse(data);
        handleClientEvent(event, d);
      } catch (_) { logWarn('DC', `不正なメッセージ: ${data}`); }
    };

    channel.onclose = () => {
      logWarn('DC', 'DataChannel クローズ');
      setStatus('dc', 'gray', '切断');
      dc = null;
    };
  };
}

function closePcDc() {
  // DataChannel 切断時は実行中の解析を停止するが、エンジンは起動したまま維持
  if (autoState === 'running' || autoState === 'stopping') {
    if (isThinking) sendEngine('stop');
    autoState = 'idle'; autoPositions = [];
    isThinking = false; aiThinkMode = false;
    logInfo('Engine', '接続断 — 解析状態をリセット');
  } else if (isThinking && !aiThinkMode) {
    sendEngine('stop');
  }
  pendingAnalysis = null; pendingAutoAnalysis = null; pendingAiThink = null;
  resumeAfterOptions = null;
  if (dc)       { try { dc.close();       } catch (_) {} dc = null; }
  if (peerConn) { try { peerConn.close(); } catch (_) {} peerConn = null; }
  setStatus('dc', 'gray', '未接続');
}

// ============================================================
//  トークン取得 (ペアリングフロー)
// ============================================================
let pairingPollTimer = null;
let pairingCancelled = false;
let pairingUrl       = '';

document.getElementById('pairing-url-btn').addEventListener('click', () => {
  if (pairingUrl) { window.api.openExternal(pairingUrl); }
});
document.getElementById('pairing-cancel').addEventListener('click', () => {
  pairingCancelled = true;
  hidePairingPanel();
  if (pairingPollTimer) { clearTimeout(pairingPollTimer); pairingPollTimer = null; }
  logWarn('Auth', 'ペアリングをキャンセルしました');
  running = false; updateToggleBtn();
});

function showPairingPanel(code, url) {
  pairingUrl = url+'/app/';
  document.getElementById('pairing-code').textContent = code;
  document.getElementById('pairing-panel').classList.add('visible');
}
function hidePairingPanel() {
  document.getElementById('pairing-panel').classList.remove('visible');
}

async function ensureAgentToken() {
  if (config.agentToken) return true;
  logInfo('Auth', 'ペアリングを開始します…');
  pairingCancelled = false;

  // Step 1: request-pairing
  let code, url;
  try {
    const res = await fetch(`${config.serverUrl}/agent/request-pairing`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        hostname:   config.agentName || require('os').hostname?.() || 'PC',
        engineName: config.engineDisplayName || config.enginePath?.split(/[/\\]/).pop() || '',
      }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    code = json.code;
    url  = json.pairingUrl;
  } catch (e) {
    logErr('Auth', `ペアリング開始失敗: ${e.message}`);
    logWarn('Auth', 'サーバーへの接続を確認してください。');
    return false;
  }

  logOk('Auth', `ペアリングコード: ${code}`);
  logInfo('Auth', `ブラウザで認証: ${url}`);
  showPairingPanel(code, url);

  // Step 2: poll until approved
  return await new Promise((resolve) => {
    const poll = async () => {
      if (pairingCancelled) { resolve(false); return; }
      try {
        const res = await fetch(`${config.serverUrl}/agent/poll?code=${encodeURIComponent(code)}`);
        if (res.ok) {
          const json = await res.json();
          if (json.approved && json.agentToken) {
            config.agentToken = json.agentToken;
            await window.api.saveConfig(config);
            document.getElementById('cfg-token').textContent = json.agentToken;
            hidePairingPanel();
            logOk('Auth', 'ペアリング承認済み — トークン保存');
            resolve(true);
            return;
          }
        }
      } catch (_) {}
      if (!pairingCancelled) {
        pairingPollTimer = setTimeout(poll, 2000);
      } else {
        resolve(false);
      }
    };
    pairingPollTimer = setTimeout(poll, 2000);
  });
}

// ============================================================
//  エージェント 開始 / 停止
// ============================================================
let running = false;

async function startAgent() {
  if (running) stopAgent();
  running = true;
  updateToggleBtn();

  logInfo('Agent', '起動します…');
  const ok = await ensureAgentToken();
  if (!ok) { running = false; updateToggleBtn(); return; }

  connectSignaling();
}

async function stopAgent() {
  running = false;
  updateToggleBtn();
  logInfo('Agent', '停止します');
  if (sigSocket)  { try { sigSocket.disconnect(); } catch (_) {} sigSocket = null; }
  closePcDc();
  await window.api.engineKill();
  engineReady = false; isThinking = false; autoState = 'idle';
  setStatus('sig', 'gray', '未接続');
  setStatus('dc',  'gray', '未接続');
  setStatus('eng', 'gray', '停止中');
}

function updateToggleBtn() {
  const btn = document.getElementById('btn-toggle');
  btn.textContent = running ? '停止' : '接続開始';
  btn.className   = running ? 'running' : 'stopped';
}

document.getElementById('btn-toggle').addEventListener('click', () => {
  if (running) stopAgent(); else startAgent();
});

// エンジン強制停止ボタン (起動中バグ時の緊急用)
document.getElementById('btn-force-stop').addEventListener('click', async () => {
  logWarn('Engine', '強制停止');
  pendingStandby = false;
  intentionalKill = true;
  if (restartTimer) { clearTimeout(restartTimer); restartTimer = null; }
  await window.api.engineKill();
  engineReady = false; isThinking = false; aiThinkMode = false;
  autoState = 'idle'; autoPositions = [];
  setStatus('eng', 'gray', 'スタンバイ');
  emitToClient('engine:status', { status: 'standby', message: 'スタンバイ中' });
  document.getElementById('btn-force-stop').style.display = 'none';
});



// ── エンジン強制再起動ボタン ──────────────────────────────────
const btnRestart = document.getElementById('btn-engine-restart');
btnRestart.addEventListener('click', async () => {
  await engine_restart();
});
async function engine_restart(){
  logWarn('Engine', 'ユーザーによる強制再起動');
  pendingAnalysis = null; pendingAutoAnalysis = null; pendingAiThink = null; pendingOptions = null;
  resumeAfterOptions = null; autoState = 'idle'; autoPositions = [];
  isThinking = false; aiThinkMode = false;
  if (restartTimer) { clearTimeout(restartTimer); restartTimer = null; }
  pendingStandby = true;
  engineReady = false;
  setStatus('eng', 'amber', '再起動中…');
  emitToClient('engine:status', { status: 'connecting', message: '強制再起動中…' });
  intentionalKill = true;
  await window.api.engineKill();
  startEngineProc();

}
// ── エンジン無応答ウォッチドッグ (30秒応答なし → 再起動ボタン強調) ──
let watchdogTimer = null;
let lastEngineOutput = 0;
const WATCHDOG_MS = 30000;

function startWatchdog() {
  clearTimeout(watchdogTimer);
  lastEngineOutput = Date.now();
  watchdogTimer = setTimeout(function check() {
    if (!isThinking && engineReady) return; // 正常スタンバイ
    const elapsed = Date.now() - lastEngineOutput;
    if (elapsed >= WATCHDOG_MS) {
      logWarn('Engine', `${WATCHDOG_MS / 1000}秒間応答なし — 「再起動」で復旧できます`);
      btnRestart.style.border = '1px solid var(--red)';
      btnRestart.style.color  = 'var(--red)';
    }
    watchdogTimer = setTimeout(check, 10000);
  }, WATCHDOG_MS);
}

// エンジン出力時にウォッチドッグリセット
const _origOnEngineLine = onEngineLine;
onEngineLine = function(line) {
  lastEngineOutput = Date.now();
  btnRestart.style.border = '1px solid var(--amber)';
  btnRestart.style.color  = 'var(--amber)';
  _origOnEngineLine(line);
};

// エンジン起動/停止時にボタン表示を制御
const _origSetStatus = setStatus;
setStatus = function(id, color, text) {
  _origSetStatus(id, color, text);
  if (id === 'eng') {
    btnRestart.style.display = (color === 'gray') ? 'none' : '';
    if (color === 'amber') startWatchdog();
    if (color === 'green' || color === 'gray') {
      clearTimeout(watchdogTimer);
      btnRestart.style.border = '1px solid var(--amber)';
      btnRestart.style.color  = 'var(--amber)';
    }
  }
};

// ============================================================
//  初期化
// ============================================================
(async () => {
  await loadAndApplyConfig();
  logInfo('Agent', 'ShogiAgent を起動しました。「接続開始」を押してください。');
  // エンジンパスが設定済みなら自動起動
  if (config.enginePath && config.agentToken) {
    startAgent();
  }
})();
