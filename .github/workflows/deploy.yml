name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps
      - run: npm run build

      - name: Deploy dist
        run: |
          rsync -az --delete dist/ /srv/shogi/dist/
          pm2 restart shogi
